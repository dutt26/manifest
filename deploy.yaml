apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-deploy
  labels:
    app: zomato
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
        - name: cont1
          image: yashwanthdutt26/nodejsimage:7f8367d3e70f28c920f87f56e72c007cd60f3418
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: abc
spec:
  type: LoadBalancer
  selector:
    app: zomato
  ports:
    - port: 80            # <-- The public port you will type in your browser (80 is standard HTTP)
      targetPort: 3000
